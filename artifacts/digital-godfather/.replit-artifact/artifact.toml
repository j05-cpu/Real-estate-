kind = "web"
previewPath = "/"
title = "Digital Godfather"
version = "1.0.0"
id = "artifacts/digital-godfather"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24857

[services.development]
run = "pnpm --filter @workspace/digital-godfather run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-godfather", "run", "build" ]
publicDir = "artifacts/digital-godfather/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24857"
BASE_PATH = "/"
